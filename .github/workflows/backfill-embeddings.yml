name: Backfill MusicBrainz Embeddings

# Backfills `musicbrainz.artist.embedding` (and optionally
# `musicbrainz.recording.embedding`) using Azure OpenAI embeddings.
#
# Runs the `server/src/scripts/backfillEmbeddings.ts` script on a GitHub
# Actions runner. The script connects to the deployed PostgreSQL server
# using PG_* secrets and calls Azure OpenAI embeddings via DefaultAzureCredential
# (the runner is authenticated to Azure via the same OIDC client used by
# `deploy.yml` and `import-musicbrainz.yml`).
#
# Required secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   AZURE_RESOURCE_GROUP
#   AZURE_AI_ENDPOINT
#   AZURE_AI_EMBEDDING_DEPLOYMENT  (optional; defaults to text-embedding-3-small)
#   COGNITIVE_SERVICES_ACCOUNT_ID  (resource ID of the Azure AI Foundry /
#                                   Cognitive Services account hosting the
#                                   embedding deployment — used to grant the
#                                   OIDC service principal the `Cognitive
#                                   Services OpenAI User` role at job start)
#   PG_HOST  /  PG_DATABASE  /  PG_USER  /  PG_PASSWORD  /  PG_SSLMODE
#   — or —
#   PG_ADMIN_PASSWORD  (uses defaults: db=musicbrainz, user=pgadmin, sslmode=require)
#
# The OIDC service principal MUST be assigned the `Cognitive Services
# OpenAI User` role on the Azure OpenAI account (the same role used by
# the Container App's managed identity). The workflow assigns this
# automatically when `COGNITIVE_SERVICES_ACCOUNT_ID` is set.

on:
  workflow_dispatch:
    inputs:
      entity:
        description: 'Which entity to backfill'
        required: false
        type: choice
        options:
          - artist
          - recording
          - all
        default: artist
      batch_size:
        description: 'Inputs per embeddings API call (max 256)'
        required: false
        default: '64'
      concurrency:
        description: 'Concurrent batches in flight (max 20)'
        required: false
        default: '5'
      limit:
        description: 'Maximum rows to process (blank = no limit)'
        required: false
        default: ''
      min_id:
        description: 'Resume from this id (default: 0)'
        required: false
        default: '0'
      dry_run:
        description: 'Compose source text without calling Azure or writing'
        required: false
        type: boolean
        default: false
      chain_run:
        description: 'Internal: current chain index (do not set manually)'
        required: false
        default: '0'
      max_chain_runs:
        description: 'Max number of automatic continuation runs (safety cap)'
        required: false
        default: '50'

permissions:
  id-token: write
  contents: read
  # Needed so the job can re-dispatch itself via `gh workflow run` when
  # the backfill is interrupted (timeout/cancel) or rows still remain.
  actions: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    # GitHub-hosted job runs are capped at 6h (360m). Cap below that so
    # the "continue if work remains" step has time to re-dispatch.
    timeout-minutes: 340

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ────────────────────────────────────────────────────────────────────────
      # Ensure the OIDC service principal can call the embeddings API.
      #
      # `deploy.yml` grants the Container App's managed identity the
      # `Cognitive Services OpenAI User` role, but the GitHub Actions OIDC
      # principal that this workflow runs as is a different identity and
      # needs its own role assignment. Without it Azure OpenAI returns
      # 401 PermissionDenied ("Principal does not have access to API/Operation").
      # ────────────────────────────────────────────────────────────────────────
      - name: Check for COGNITIVE_SERVICES_ACCOUNT_ID secret
        id: check_cog_id
        env:
          COGNITIVE_SERVICES_ACCOUNT_ID: ${{ secrets.COGNITIVE_SERVICES_ACCOUNT_ID }}
        run: |
          if [ -n "$COGNITIVE_SERVICES_ACCOUNT_ID" ]; then
            echo "is_set=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_set=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Grant OIDC principal Cognitive Services OpenAI User role
        if: steps.check_cog_id.outputs.is_set == 'true'
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          COGNITIVE_SERVICES_ACCOUNT_ID: ${{ secrets.COGNITIVE_SERVICES_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # Cognitive Services OpenAI User
          ROLE_ID="5e0bd9bd-7b93-4f28-af87-19fc36ad61bd"
          PRINCIPAL_OBJECT_ID="$(az ad sp show --id "$AZURE_CLIENT_ID" --query id -o tsv)"
          if [ -z "$PRINCIPAL_OBJECT_ID" ]; then
            echo "::error::Failed to resolve service principal object ID for AZURE_CLIENT_ID."
            exit 1
          fi
          echo "Granting role 'Cognitive Services OpenAI User' to principal $PRINCIPAL_OBJECT_ID on $COGNITIVE_SERVICES_ACCOUNT_ID"
          # Idempotent: ignore "already exists" failures.
          if ! az role assignment create \
                --assignee-object-id "$PRINCIPAL_OBJECT_ID" \
                --assignee-principal-type ServicePrincipal \
                --role "$ROLE_ID" \
                --scope "$COGNITIVE_SERVICES_ACCOUNT_ID" 1>/dev/null 2>role-err.log; then
            if grep -qi "RoleAssignmentExists\|already exists" role-err.log; then
              echo "✅ Role assignment already exists."
            else
              cat role-err.log >&2
              echo "::error::Failed to create role assignment."
              exit 1
            fi
          else
            echo "✅ Role assignment created."
          fi
          # RBAC propagation can take ~30s before tokens reflect the new role.
          echo "Waiting 45s for RBAC propagation..."
          sleep 45

      - name: Warn if COGNITIVE_SERVICES_ACCOUNT_ID is not set
        if: steps.check_cog_id.outputs.is_set != 'true'
        run: |
          echo "::warning::COGNITIVE_SERVICES_ACCOUNT_ID secret is not set; skipping role assignment. The OIDC principal must already have 'Cognitive Services OpenAI User' on the Foundry account or the backfill will fail with HTTP 401."

      # ────────────────────────────────────────────────────────────────────────
      # Resolve PostgreSQL connection (mirrors import-musicbrainz.yml)
      # ────────────────────────────────────────────────────────────────────────
      - name: Resolve PostgreSQL connection settings
        id: pg
        run: |
          RESOLVED_PGHOST="${{ secrets.PG_HOST }}"
          RESOLVED_PGDATABASE="${{ secrets.PG_DATABASE }}"
          if [ -z "$RESOLVED_PGDATABASE" ]; then
            RESOLVED_PGDATABASE="musicbrainz"
          fi
          RESOLVED_PGUSER="${{ secrets.PG_USER }}"
          if [ -z "$RESOLVED_PGUSER" ]; then
            RESOLVED_PGUSER="pgadmin"
          fi
          RESOLVED_PGPASSWORD="${{ secrets.PG_PASSWORD }}"
          if [ -z "$RESOLVED_PGPASSWORD" ]; then
            RESOLVED_PGPASSWORD="${{ secrets.PG_ADMIN_PASSWORD }}"
          fi
          RESOLVED_PGSSLMODE="${{ secrets.PG_SSLMODE }}"
          if [ -z "$RESOLVED_PGSSLMODE" ]; then
            RESOLVED_PGSSLMODE="require"
          fi

          if [ -z "$RESOLVED_PGHOST" ]; then
            echo "::error::PG_HOST secret is not set."
            exit 1
          fi
          if [ -z "$RESOLVED_PGPASSWORD" ]; then
            echo "::error::PG_PASSWORD (or PG_ADMIN_PASSWORD) secret is not set."
            exit 1
          fi

          echo "::add-mask::$RESOLVED_PGPASSWORD"
          {
            echo "PGHOST=$RESOLVED_PGHOST"
            echo "PGDATABASE=$RESOLVED_PGDATABASE"
            echo "PGUSER=$RESOLVED_PGUSER"
            echo "PGPASSWORD=$RESOLVED_PGPASSWORD"
            echo "PGSSLMODE=$RESOLVED_PGSSLMODE"
          } >> "$GITHUB_OUTPUT"

          echo "✅ PostgreSQL: host=$RESOLVED_PGHOST db=$RESOLVED_PGDATABASE user=$RESOLVED_PGUSER"

      # ────────────────────────────────────────────────────────────────────────
      # Ensure the PostgreSQL server is running before attempting the backfill.
      # Azure Flexible Server can be auto-paused or manually stopped to save
      # costs. Without this step the backfill hangs on the first query when
      # the server is in the 'Stopped' state.
      # ────────────────────────────────────────────────────────────────────────
      - name: Ensure PostgreSQL server is running
        env:
          PGHOST: ${{ steps.pg.outputs.PGHOST }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          # Derive the Azure Flexible Server name from the FQDN.
          # Format: <server-name>.postgres.database.azure.com
          PG_SERVER="${PGHOST%.postgres.database.azure.com}"
          if [ "$PG_SERVER" = "$PGHOST" ]; then
            echo "⚠ PGHOST ($PGHOST) is not an Azure Flexible Server FQDN; skipping server state check."
            exit 0
          fi
          if [ -z "$AZURE_RESOURCE_GROUP" ]; then
            echo "⚠ AZURE_RESOURCE_GROUP secret is not set; skipping server state check."
            exit 0
          fi

          SERVER_STATE=$(az postgres flexible-server show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$PG_SERVER" \
            --query "state" -o tsv 2>/dev/null || echo "Unknown")
          echo "Current server state: $SERVER_STATE"

          if [ "$SERVER_STATE" != "Ready" ]; then
            echo "🔄 Starting PostgreSQL server…"
            az postgres flexible-server start \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$PG_SERVER"
            echo "⏳ Waiting for server to become ready…"
            MAX_ATTEMPTS=30
            POLL_INTERVAL=10
            for i in $(seq 1 "$MAX_ATTEMPTS"); do
              STATE=$(az postgres flexible-server show \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --name "$PG_SERVER" \
                --query "state" -o tsv 2>/dev/null || echo "Unknown")
              if [ "$STATE" = "Ready" ]; then
                echo "✅ Server is ready."
                break
              fi
              if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
                echo "❌ Server did not become ready after $MAX_ATTEMPTS attempts." >&2
                exit 1
              fi
              echo "  …still waiting (attempt $i/$MAX_ATTEMPTS, state: $STATE)"
              sleep "$POLL_INTERVAL"
            done
          else
            echo "✅ Server is already running."
          fi

      # ────────────────────────────────────────────────────────────────────────
      # Build the server (we only need the compiled JS for the backfill script)
      # ────────────────────────────────────────────────────────────────────────
      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Build server
        working-directory: server
        run: npm run build

      # ────────────────────────────────────────────────────────────────────────
      # Run the backfill script
      #
      # The script is resumable: it queries `WHERE embedding IS NULL ORDER BY id`,
      # so any re-run picks up where a previous run left off. We use
      # `continue-on-error` so that if the job is interrupted (timeout, a
      # transient error from Azure, etc.) the "continue if work remains"
      # step below still runs and re-dispatches the workflow.
      # ────────────────────────────────────────────────────────────────────────
      - name: Run backfill
        id: backfill
        working-directory: server
        continue-on-error: true
        env:
          PGHOST: ${{ steps.pg.outputs.PGHOST }}
          PGDATABASE: ${{ steps.pg.outputs.PGDATABASE }}
          PGUSER: ${{ steps.pg.outputs.PGUSER }}
          PGPASSWORD: ${{ steps.pg.outputs.PGPASSWORD }}
          PGSSLMODE: ${{ steps.pg.outputs.PGSSLMODE }}
          AZURE_AI_ENDPOINT: ${{ secrets.AZURE_AI_ENDPOINT }}
          AZURE_AI_EMBEDDING_DEPLOYMENT: ${{ secrets.AZURE_AI_EMBEDDING_DEPLOYMENT }}
        run: |
          ARGS=(
            "--entity=${{ inputs.entity }}"
            "--batch-size=${{ inputs.batch_size }}"
            "--concurrency=${{ inputs.concurrency }}"
            "--min-id=${{ inputs.min_id }}"
          )
          if [ -n "${{ inputs.limit }}" ]; then
            ARGS+=("--limit=${{ inputs.limit }}")
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=("--dry-run")
          fi
          echo "Running: npm run backfill:embeddings -- ${ARGS[*]}"
          npm run backfill:embeddings -- "${ARGS[@]}"

      # ────────────────────────────────────────────────────────────────────────
      # Continue if work remains
      #
      # The backfill is resumable but a single GitHub Actions job is capped
      # at 6 hours, and large MusicBrainz tables (millions of artists /
      # recordings) can easily exceed that. After the backfill step finishes
      # (whether it succeeded, timed out, or errored), count how many rows
      # still have NULL embeddings for the requested entity. If any remain
      # and we haven't hit the chain cap, re-dispatch this workflow with
      # the same inputs and an incremented `chain_run` counter.
      #
      # We always pass --min-id=0 to the next run so we don't miss any rows
      # that became NULL since the previous run; the index makes the scan
      # cheap and the script just picks up the next un-embedded id.
      # ────────────────────────────────────────────────────────────────────────
      - name: Check remaining work and chain next run
        if: ${{ always() && inputs.dry_run != true }}
        env:
          PGHOST: ${{ steps.pg.outputs.PGHOST }}
          PGDATABASE: ${{ steps.pg.outputs.PGDATABASE }}
          PGUSER: ${{ steps.pg.outputs.PGUSER }}
          PGPASSWORD: ${{ steps.pg.outputs.PGPASSWORD }}
          PGSSLMODE: ${{ steps.pg.outputs.PGSSLMODE }}
          GH_TOKEN: ${{ github.token }}
          ENTITY: ${{ inputs.entity }}
          CHAIN_RUN: ${{ inputs.chain_run }}
          MAX_CHAIN_RUNS: ${{ inputs.max_chain_runs }}
          BACKFILL_OUTCOME: ${{ steps.backfill.outcome }}
        run: |
          set -euo pipefail
          echo "Backfill step outcome: $BACKFILL_OUTCOME"

          # Install psql client (kept out of earlier steps so we don't slow
          # down the happy path; apt is cached on the runner image).
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update -qq
            sudo apt-get install -y -qq postgresql-client >/dev/null
          fi

          # Build the list of tables to check based on --entity.
          case "$ENTITY" in
            artist)    TABLES=("artist") ;;
            recording) TABLES=("recording") ;;
            all)       TABLES=("artist" "recording") ;;
            *)
              echo "::error::Unknown entity: $ENTITY"
              exit 1
              ;;
          esac

          TOTAL_REMAINING=0
          for t in "${TABLES[@]}"; do
            REMAINING=$(PGPASSWORD="$PGPASSWORD" psql \
              -h "$PGHOST" -U "$PGUSER" -d "$PGDATABASE" \
              -v ON_ERROR_STOP=1 -At \
              -c "SELECT COUNT(*) FROM musicbrainz.$t WHERE embedding IS NULL;")
            echo "musicbrainz.$t rows with NULL embedding: $REMAINING"
            TOTAL_REMAINING=$((TOTAL_REMAINING + REMAINING))
          done
          echo "Total remaining: $TOTAL_REMAINING"

          if [ "$TOTAL_REMAINING" -eq 0 ]; then
            echo "✅ No remaining rows for entity=$ENTITY. Backfill is complete."
            # Surface the original backfill exit code as the job result.
            if [ "$BACKFILL_OUTCOME" != "success" ]; then
              echo "::warning::Backfill step outcome was '$BACKFILL_OUTCOME' but no rows remain."
            fi
            exit 0
          fi

          NEXT_CHAIN=$((CHAIN_RUN + 1))
          if [ "$NEXT_CHAIN" -gt "$MAX_CHAIN_RUNS" ]; then
            echo "::error::Reached max_chain_runs=$MAX_CHAIN_RUNS with $TOTAL_REMAINING rows still pending. Stopping auto-continuation; re-run the workflow manually to keep going."
            exit 1
          fi

          echo "Chaining next run ($NEXT_CHAIN / $MAX_CHAIN_RUNS) with $TOTAL_REMAINING rows still to embed."
          # Re-dispatch this workflow with the same inputs. We deliberately
          # reset --min-id to 0 so we never skip rows that became NULL since
          # the previous run; the resumable query is index-driven and cheap.
          GH_ARGS=(
            "--ref" "${{ github.ref_name }}"
            "-f" "entity=${{ inputs.entity }}"
            "-f" "batch_size=${{ inputs.batch_size }}"
            "-f" "concurrency=${{ inputs.concurrency }}"
            "-f" "min_id=0"
            "-f" "dry_run=false"
            "-f" "chain_run=$NEXT_CHAIN"
            "-f" "max_chain_runs=$MAX_CHAIN_RUNS"
          )
          if [ -n "${{ inputs.limit }}" ]; then
            GH_ARGS+=("-f" "limit=${{ inputs.limit }}")
          fi
          gh workflow run "${{ github.workflow }}" "${GH_ARGS[@]}"
          echo "✅ Dispatched continuation run."

          # If the backfill step itself failed (vs. just ran out of time on
          # a successful page-by-page run), surface that so the chained run
          # is visibly recovering from an error.
          if [ "$BACKFILL_OUTCOME" = "failure" ]; then
            echo "::warning::Previous backfill step failed; continuation run dispatched to retry remaining rows."
          fi
