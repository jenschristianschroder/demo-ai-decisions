name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  APP_NAME: ai-decisions
  INFRA_DEPLOYMENT_NAME: ai-decisions-infra
  MAX_ACR_LOOKUP_ATTEMPTS: '12'
  ACR_LOOKUP_SLEEP_SECONDS: '10'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # â”€â”€â”€ Ensure resource group exists â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Ensure Resource Group exists
        run: |
          if [ -z "$LOCATION" ]; then
            echo "::error::AZURE_LOCATION repository variable is not set. Configure it in Settings â†’ Variables â†’ Actions."
            exit 1
          fi
          az group create \
            --name "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --location "$LOCATION"
        env:
          LOCATION: ${{ vars.AZURE_LOCATION }}

      # â”€â”€â”€ Deploy infrastructure (creates ACR if needed) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Deploy Bicep (infra only â€” placeholder images)
        uses: azure/bicep-deploy@v2
        id: infra
        continue-on-error: true
        with:
          deploymentName: ${{ env.INFRA_DEPLOYMENT_NAME }}
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          scope: resourceGroup
          templateFile: infra/main.bicep
          parameters: >-
            imageTag=${{ github.sha }}
            azureAiEndpoint=${{ secrets.AZURE_AI_ENDPOINT }}
            azureAiDeployment=${{ secrets.AZURE_AI_DEPLOYMENT }}
            cognitiveServicesAccountId=${{ secrets.COGNITIVE_SERVICES_ACCOUNT_ID }}
            pgAdminPassword=${{ secrets.PG_ADMIN_PASSWORD }}
          failOnStdErr: false

      - name: Validate infra deployment failure reason
        if: steps.infra.outcome == 'failure'
        run: |
          DEPLOYMENT_ERROR="$(az deployment group show --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" --name "${{ env.INFRA_DEPLOYMENT_NAME }}" --query properties.error -o json)"
          echo "$DEPLOYMENT_ERROR"

          if echo "$DEPLOYMENT_ERROR" | jq -e '.. | objects | .message? | strings | select(contains("MANIFEST_UNKNOWN"))' >/dev/null; then
            echo "Detected expected MANIFEST_UNKNOWN in deployment error payload; continuing workflow."
            exit 0
          fi

          DEPLOYMENT_OPERATIONS="$(az deployment operation group list --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" --name "${{ env.INFRA_DEPLOYMENT_NAME }}" --query "[?properties.provisioningState=='Failed'].properties.statusMessage" -o json)"
          echo "$DEPLOYMENT_OPERATIONS"

          if ! echo "$DEPLOYMENT_OPERATIONS" | jq -e '.[]? | .. | objects | .message? | strings | select(contains("MANIFEST_UNKNOWN"))' >/dev/null; then
            echo "::error::Infra deployment failed for an unexpected reason."
            exit 1
          fi

      - name: Resolve ACR login server
        id: acr
        run: |
          ACR_LOGIN_SERVER="${{ steps.infra.outputs.acrLoginServer }}"

          if [ -z "$ACR_LOGIN_SERVER" ]; then
            for _ in $(seq 1 "${{ env.MAX_ACR_LOOKUP_ATTEMPTS }}"); do
              ACR_LOGIN_SERVER="$(az acr list --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" --query "[0].loginServer" -o tsv)"
              [ -n "$ACR_LOGIN_SERVER" ] && break
              sleep "${{ env.ACR_LOOKUP_SLEEP_SECONDS }}"
            done
          fi

          if [ -z "$ACR_LOGIN_SERVER" ]; then
            echo "::error::Unable to resolve ACR login server from deployment output or resource group."
            exit 1
          fi

          echo "acrLoginServer=$ACR_LOGIN_SERVER" >> "$GITHUB_OUTPUT"

      # â”€â”€â”€ Build & push container image â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: ACR Login
        run: az acr login --name $(echo "${{ steps.acr.outputs.acrLoginServer }}" | cut -d. -f1)

      - name: Build & push SPA image
        run: |
          docker build \
            -t ${{ steps.acr.outputs.acrLoginServer }}/${{ env.APP_NAME }}-spa:${{ github.sha }} .
          docker push ${{ steps.acr.outputs.acrLoginServer }}/${{ env.APP_NAME }}-spa:${{ github.sha }}

      # â”€â”€â”€ Resolve PostgreSQL connection settings â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # Uses infra Bicep outputs when available, otherwise falls back to
      # GitHub secrets: PG_HOST, PG_DATABASE, PG_USER, PG_PASSWORD, PG_SSLMODE
      - name: Resolve PostgreSQL connection settings
        id: pg
        run: |
          RESOLVED_PGHOST="${{ steps.infra.outputs.pgFqdn }}"
          if [ -z "$RESOLVED_PGHOST" ]; then
            RESOLVED_PGHOST="${{ secrets.PG_HOST }}"
          fi
          RESOLVED_PGDATABASE="${{ secrets.PG_DATABASE }}"
          if [ -z "$RESOLVED_PGDATABASE" ]; then
            RESOLVED_PGDATABASE="musicbrainz"
          fi
          RESOLVED_PGUSER="${{ secrets.PG_USER }}"
          if [ -z "$RESOLVED_PGUSER" ]; then
            RESOLVED_PGUSER="pgadmin"
          fi
          RESOLVED_PGPASSWORD="${{ secrets.PG_PASSWORD }}"
          if [ -z "$RESOLVED_PGPASSWORD" ]; then
            RESOLVED_PGPASSWORD="${{ secrets.PG_ADMIN_PASSWORD }}"
          fi
          RESOLVED_PGSSLMODE="${{ secrets.PG_SSLMODE }}"
          if [ -z "$RESOLVED_PGSSLMODE" ]; then
            RESOLVED_PGSSLMODE="require"
          fi

          echo "pgHost=$RESOLVED_PGHOST" >> "$GITHUB_OUTPUT"
          echo "pgDatabase=$RESOLVED_PGDATABASE" >> "$GITHUB_OUTPUT"
          echo "pgUser=$RESOLVED_PGUSER" >> "$GITHUB_OUTPUT"
          echo "pgPassword=$RESOLVED_PGPASSWORD" >> "$GITHUB_OUTPUT"
          echo "pgSslMode=$RESOLVED_PGSSLMODE" >> "$GITHUB_OUTPUT"

          if [ -n "$RESOLVED_PGHOST" ]; then
            echo "âś… PostgreSQL will be configured: host=$RESOLVED_PGHOST, db=$RESOLVED_PGDATABASE, user=$RESOLVED_PGUSER, ssl=$RESOLVED_PGSSLMODE"
          else
            echo "âš ď¸Ź No PGHOST resolved â€” app will fall back to AI-only mode. Set PG_HOST secret or ensure Bicep deploys PostgreSQL."
          fi

      # â”€â”€â”€ Update container app with new image â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Update SPA Container App
        run: |
          az containerapp update \
            --name ${{ env.APP_NAME }}-spa \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ steps.acr.outputs.acrLoginServer }}/${{ env.APP_NAME }}-spa:${{ github.sha }} \
            --set-env-vars \
              "AZURE_AI_ENDPOINT=${{ secrets.AZURE_AI_ENDPOINT }}" \
              "AZURE_AI_DEPLOYMENT=${{ secrets.AZURE_AI_DEPLOYMENT }}" \
              "AZURE_AI_EMBEDDING_DEPLOYMENT=${{ secrets.AZURE_AI_EMBEDDING_DEPLOYMENT }}" \
              "PGHOST=${{ steps.pg.outputs.pgHost }}" \
              "PGDATABASE=${{ steps.pg.outputs.pgDatabase }}" \
              "PGUSER=${{ steps.pg.outputs.pgUser }}" \
              "PGPASSWORD=${{ steps.pg.outputs.pgPassword }}" \
              "PGSSLMODE=${{ steps.pg.outputs.pgSslMode }}" \
            --min-replicas 1

      # â”€â”€â”€ Initialize PostgreSQL database (schema + extensions) â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Initialize PostgreSQL database
        if: steps.pg.outputs.pgHost != ''
        run: |
          PG_FQDN="${{ steps.pg.outputs.pgHost }}"
          if [ -n "$PG_FQDN" ]; then
            echo "Initializing database schema on $PG_FQDN..."
            PGPASSWORD="${{ steps.pg.outputs.pgPassword }}" psql \
              "host=$PG_FQDN dbname=${{ steps.pg.outputs.pgDatabase }} user=${{ steps.pg.outputs.pgUser }} sslmode=${{ steps.pg.outputs.pgSslMode }}" \
              -f server/src/db/initSchema.sql
          else
            echo "::warning::Could not resolve PostgreSQL server FQDN â€” skipping DB init."
          fi

      - name: Output SPA URL
        run: |
          SPA_FQDN="$(az containerapp show --name ${{ env.APP_NAME }}-spa --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --query properties.configuration.ingress.fqdn -o tsv)"
          echo "đźš€ SPA deployed to https://${SPA_FQDN}"
