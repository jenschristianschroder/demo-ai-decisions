name: Import MusicBrainz Data

# Downloads the latest MusicBrainz full-export dump and loads the subset of
# tables used by the Music Intelligence Graph demo into PostgreSQL.
#
# Data source: https://data.metabrainz.org/pub/musicbrainz/data/fullexport/
#
# Required secrets (same as deploy workflow):
#   PG_HOST  /  PG_DATABASE  /  PG_USER  /  PG_PASSWORD  /  PG_SSLMODE
#   — or —
#   PG_ADMIN_PASSWORD  (uses defaults: host from last deploy, db=musicbrainz,
#                       user=pgadmin, sslmode=require)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'MusicBrainz full-export base URL'
        required: false
        default: 'https://data.metabrainz.org/pub/musicbrainz/data/fullexport'

permissions:
  contents: read

env:
  BASE_URL: ${{ inputs.base_url || 'https://data.metabrainz.org/pub/musicbrainz/data/fullexport' }}

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 720            # full dump can take a while

    steps:
      # ────────────────────────────────────────────────────────────────────────
      # 1. Checkout (we need the SQL helper scripts)
      # ────────────────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      # ────────────────────────────────────────────────────────────────────────
      # 2. Resolve PostgreSQL connection
      # ────────────────────────────────────────────────────────────────────────
      - name: Resolve PostgreSQL connection settings
        id: pg
        run: |
          RESOLVED_PGHOST="${{ secrets.PG_HOST }}"
          RESOLVED_PGDATABASE="${{ secrets.PG_DATABASE }}"
          if [ -z "$RESOLVED_PGDATABASE" ]; then
            RESOLVED_PGDATABASE="musicbrainz"
          fi
          RESOLVED_PGUSER="${{ secrets.PG_USER }}"
          if [ -z "$RESOLVED_PGUSER" ]; then
            RESOLVED_PGUSER="pgadmin"
          fi
          RESOLVED_PGPASSWORD="${{ secrets.PG_PASSWORD }}"
          if [ -z "$RESOLVED_PGPASSWORD" ]; then
            RESOLVED_PGPASSWORD="${{ secrets.PG_ADMIN_PASSWORD }}"
          fi
          RESOLVED_PGSSLMODE="${{ secrets.PG_SSLMODE }}"
          if [ -z "$RESOLVED_PGSSLMODE" ]; then
            RESOLVED_PGSSLMODE="require"
          fi

          if [ -z "$RESOLVED_PGHOST" ]; then
            echo "::error::PG_HOST secret is not set. Cannot connect to PostgreSQL."
            exit 1
          fi
          if [ -z "$RESOLVED_PGPASSWORD" ]; then
            echo "::error::PG_PASSWORD (or PG_ADMIN_PASSWORD) secret is not set."
            exit 1
          fi

          # Build a connection string with TCP keepalive parameters to prevent
          # the server / load-balancer from closing idle connections.
          echo "::add-mask::$RESOLVED_PGPASSWORD"
          CONNSTR="host=$RESOLVED_PGHOST dbname=$RESOLVED_PGDATABASE user=$RESOLVED_PGUSER password=$RESOLVED_PGPASSWORD sslmode=$RESOLVED_PGSSLMODE keepalives=1 keepalives_idle=30 keepalives_interval=10 keepalives_count=5"
          echo "connstr=$CONNSTR" >> "$GITHUB_OUTPUT"

          echo "✅ PostgreSQL: host=$RESOLVED_PGHOST db=$RESOLVED_PGDATABASE user=$RESOLVED_PGUSER ssl=$RESOLVED_PGSSLMODE (keepalives enabled)"

      # ────────────────────────────────────────────────────────────────────────
      # 3. Discover the latest dump
      # ────────────────────────────────────────────────────────────────────────
      - name: Discover latest MusicBrainz dump
        id: latest
        run: |
          LATEST="$(curl -sSf "${{ env.BASE_URL }}/LATEST")"
          LATEST="$(echo "$LATEST" | tr -d '[:space:]')"
          echo "dump=$LATEST" >> "$GITHUB_OUTPUT"
          echo "📦 Latest dump: $LATEST"

      # ────────────────────────────────────────────────────────────────────────
      # 4. Download and extract only the tables we need
      # ────────────────────────────────────────────────────────────────────────
      - name: Download dump archives
        run: |
          DUMP_BASE="${{ env.BASE_URL }}/${{ steps.latest.outputs.dump }}"

          echo "⬇️  Downloading mbdump.tar.bz2 …"
          echo "   URL: $DUMP_BASE/mbdump.tar.bz2"
          echo "   Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          curl -fL --progress-bar -o mbdump.tar.bz2 "$DUMP_BASE/mbdump.tar.bz2"
          echo "   Finished at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          ls -lh mbdump.tar.bz2

          # tag and artist_tag live in the derived dump
          echo "⬇️  Downloading mbdump-derived.tar.bz2 …"
          echo "   URL: $DUMP_BASE/mbdump-derived.tar.bz2"
          echo "   Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          curl -fL --progress-bar -o mbdump-derived.tar.bz2 "$DUMP_BASE/mbdump-derived.tar.bz2"
          echo "   Finished at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          ls -lh mbdump-derived.tar.bz2

      - name: Extract required table files
        run: |
          # Tables in mbdump.tar.bz2
          CORE_TABLES=(
            artist
            artist_type
            area
            recording
            release_group
            release
            release_country
            release_label
            label
            work
            artist_credit
            artist_credit_name
            genre
            l_artist_artist
            l_artist_recording
            l_artist_release
            l_artist_work
            link
            link_type
          )

          # Tables in mbdump-derived.tar.bz2
          DERIVED_TABLES=(
            tag
            artist_tag
          )

          # Extract core tables
          PATHS=()
          for t in "${CORE_TABLES[@]}"; do
            PATHS+=("mbdump/$t")
          done
          echo "📂 Extracting ${#PATHS[@]} core table files …"
          echo "   Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          tar -xjvf mbdump.tar.bz2 "${PATHS[@]}"
          echo "   Finished at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          # Extract derived tables
          PATHS=()
          for t in "${DERIVED_TABLES[@]}"; do
            PATHS+=("mbdump/$t")
          done
          echo "📂 Extracting ${#PATHS[@]} derived table files …"
          echo "   Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          tar -xjvf mbdump-derived.tar.bz2 "${PATHS[@]}"
          echo "   Finished at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          echo ""
          echo "📊 Extracted file sizes:"
          ls -lhS mbdump/

          # Free disk space
          rm -f mbdump.tar.bz2 mbdump-derived.tar.bz2
          echo "🗑️  Removed archive files to free disk space"
          df -h . | tail -1 | awk '{print "💾 Available disk space: " $4}'

      # ────────────────────────────────────────────────────────────────────────
      # 5. Create reusable retry helper script
      # ────────────────────────────────────────────────────────────────────────
      - name: Create retry helper
        run: |
          cat > /tmp/psql_retry.sh << 'SCRIPT'
          #!/usr/bin/env bash
          # psql_retry.sh — runs a psql command with retry + exponential backoff.
          # Usage: source /tmp/psql_retry.sh
          #        psql_retry <connstr> [psql args ...]
          #
          # Environment:
          #   RETRY_MAX   — max attempts (default 5)
          #   RETRY_DELAY — initial delay in seconds (default 5)

          psql_retry() {
            local connstr="$1"; shift
            local max_attempts="${RETRY_MAX:-5}"
            local delay="${RETRY_DELAY:-5}"

            for (( attempt=1; attempt<=max_attempts; attempt++ )); do
              set +e
              psql "$connstr" "$@"
              local rc=$?
              set -e
              if [ "$rc" -eq 0 ]; then
                return 0
              fi
              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "::error::psql failed after $max_attempts attempts (exit code $rc)"
                return $rc
              fi
              echo "⚠️  psql failed (exit $rc) — retrying in ${delay}s (attempt $attempt/$max_attempts) …"
              sleep "$delay"
              delay=$((delay * 2))
            done
          }

          # Variant that captures stdout while still retrying.
          psql_retry_capture() {
            local connstr="$1"; shift
            local max_attempts="${RETRY_MAX:-5}"
            local delay="${RETRY_DELAY:-5}"
            local tmpfile
            tmpfile=$(mktemp)

            for (( attempt=1; attempt<=max_attempts; attempt++ )); do
              set +e
              psql "$connstr" "$@" > "$tmpfile" 2>&1
              local rc=$?
              set -e
              if [ "$rc" -eq 0 ]; then
                cat "$tmpfile"
                rm -f "$tmpfile"
                return 0
              fi
              if [ "$attempt" -eq "$max_attempts" ]; then
                cat "$tmpfile"
                rm -f "$tmpfile"
                echo "::error::psql failed after $max_attempts attempts (exit code $rc)"
                return $rc
              fi
              echo "⚠️  psql failed (exit $rc) — retrying in ${delay}s (attempt $attempt/$max_attempts) …" >&2
              sleep "$delay"
              delay=$((delay * 2))
            done
          }
          SCRIPT
          chmod +x /tmp/psql_retry.sh
          echo "✅ Retry helper created"

      # ────────────────────────────────────────────────────────────────────────
      # 6. Ensure demo schema exists
      # ────────────────────────────────────────────────────────────────────────
      - name: Ensure demo schema exists
        run: |
          source /tmp/psql_retry.sh
          psql_retry "${{ steps.pg.outputs.connstr }}" -f server/src/db/initSchema.sql
        env:
          PGCONNECT_TIMEOUT: '30'

      # ────────────────────────────────────────────────────────────────────────
      # 7. Create staging tables
      # ────────────────────────────────────────────────────────────────────────
      - name: Create staging tables
        run: |
          source /tmp/psql_retry.sh
          psql_retry "${{ steps.pg.outputs.connstr }}" -f server/src/db/mb_staging_create.sql
        env:
          PGCONNECT_TIMEOUT: '30'

      # ────────────────────────────────────────────────────────────────────────
      # 8. COPY dump data into staging tables
      # ────────────────────────────────────────────────────────────────────────
      - name: Load dump files into staging tables
        run: |
          source /tmp/psql_retry.sh
          CONNSTR="${{ steps.pg.outputs.connstr }}"
          TABLES=(
            artist
            artist_type
            area
            recording
            release_group
            release
            release_country
            release_label
            label
            work
            artist_credit
            artist_credit_name
            genre
            tag
            artist_tag
            l_artist_artist
            l_artist_recording
            l_artist_release
            l_artist_work
            link
            link_type
          )

          TOTAL=${#TABLES[@]}
          CURRENT=0
          IMPORT_START=$(date +%s)
          echo "🚀 Starting import of $TOTAL tables at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""

          for t in "${TABLES[@]}"; do
            CURRENT=$((CURRENT + 1))
            FILE="mbdump/$t"
            if [ ! -f "$FILE" ]; then
              echo "⚠️  [$CURRENT/$TOTAL] Skipping $t — file not found"
              continue
            fi

            FILE_SIZE=$(ls -lh "$FILE" | awk '{print $5}')
            ROW_COUNT=$(wc -l < "$FILE")
            echo "📥 [$CURRENT/$TOTAL] Loading $t ($ROW_COUNT rows, $FILE_SIZE) …"
            TABLE_START=$(date +%s)

            psql_retry "$CONNSTR" -c "\\copy mb_staging.$t FROM '$FILE'"

            TABLE_END=$(date +%s)
            TABLE_ELAPSED=$((TABLE_END - TABLE_START))
            TOTAL_ELAPSED=$((TABLE_END - IMPORT_START))
            DB_ROWS=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COUNT(*) FROM mb_staging.$t")
            echo "   ✅ $t loaded — $DB_ROWS rows in DB — took ${TABLE_ELAPSED}s (total elapsed: ${TOTAL_ELAPSED}s)"
          done

          IMPORT_END=$(date +%s)
          TOTAL_TIME=$((IMPORT_END - IMPORT_START))
          echo ""
          echo "🏁 All tables loaded in ${TOTAL_TIME}s (finished at $(date -u '+%Y-%m-%d %H:%M:%S UTC'))"
        env:
          PGCONNECT_TIMEOUT: '30'

      # ────────────────────────────────────────────────────────────────────────
      # 9. Transform staging → demo tables
      # ────────────────────────────────────────────────────────────────────────
      - name: "Transform: setup & core tables"
        run: |
          source /tmp/psql_retry.sh
          echo "🔄 Part 1 — Truncate + load artist / artist_type / area …"
          echo "   Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          psql_retry "${{ steps.pg.outputs.connstr }}" -e --set=ON_ERROR_STOP=1 \
            -f server/src/db/mb_staging_load_setup.sql
          echo "✅ Part 1 done at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        env:
          PGCONNECT_TIMEOUT: '30'

      - name: "Transform: batch-insert recording"
        run: |
          source /tmp/psql_retry.sh
          CONNSTR="${{ steps.pg.outputs.connstr }}"
          BATCH=500000

          MIN_ID=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COALESCE(min(id), 0) FROM mb_staging.recording")
          MAX_ID=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COALESCE(max(id), 0) FROM mb_staging.recording")

          echo "📥 Batch-inserting recording rows (id $MIN_ID → $MAX_ID, batch size $BATCH) …"
          echo "   Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          TOTAL=0

          for (( start=MIN_ID; start<=MAX_ID; start+=BATCH )); do
            END=$((start + BATCH))
            ROWS=$(psql_retry_capture "$CONNSTR" -t -A -c "
              SET session_replication_role = 'replica';
              SET statement_timeout = 0;
              INSERT INTO musicbrainz.recording (id, gid, name, artist_credit, length, comment)
              SELECT id, gid, name, artist_credit, length, COALESCE(comment, '')
              FROM mb_staging.recording
              WHERE id >= $start AND id < $END
              ON CONFLICT (id) DO NOTHING;
            ")
            COUNT=$(echo "$ROWS" | tail -1 | grep -oE '[0-9]+' | tail -1 || echo 0)
            TOTAL=$((TOTAL + COUNT))
            echo "   ✅ id [$start, $END) — $COUNT rows (cumulative: $TOTAL)"
          done

          echo "✅ Recording done — $TOTAL total rows at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        env:
          PGCONNECT_TIMEOUT: '30'

      - name: "Transform: remaining entity & link tables (batched)"
        run: |
          source /tmp/psql_retry.sh
          CONNSTR="${{ steps.pg.outputs.connstr }}"
          BATCH=500000

          echo "🔄 Part 2 — release_group … artist_tag … link_type … l_artist_artist …"
          echo "   Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          # ── Reset recording sequence ──
          psql_retry "$CONNSTR" -c "
            SELECT setval(pg_get_serial_sequence('musicbrainz.recording', 'id'),
                          COALESCE((SELECT MAX(id) FROM musicbrainz.recording), 1));"

          # ── Helper: batch-insert a table by id range ──
          batch_insert_by_id() {
            local table_name="$1"
            local insert_sql_template="$2"  # must contain __START__ and __END__ placeholders

            local min_id max_id
            min_id=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COALESCE(min(id), 0) FROM mb_staging.$table_name")
            max_id=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COALESCE(max(id), 0) FROM mb_staging.$table_name")

            echo "  📥 Batch-inserting $table_name (id $min_id → $max_id, batch $BATCH) …"
            local total=0

            for (( s=min_id; s<=max_id; s+=BATCH )); do
              local e=$((s + BATCH))
              local sql="${insert_sql_template//__START__/$s}"
              sql="${sql//__END__/$e}"
              local rows
              rows=$(psql_retry_capture "$CONNSTR" -t -A -c "
                SET session_replication_role = 'replica';
                SET statement_timeout = 0;
                $sql
              ")
              local count
              count=$(echo "$rows" | tail -1 | grep -oE '[0-9]+' | tail -1 || echo 0)
              total=$((total + count))
              echo "    ✅ id [$s, $e) — $count rows (cumulative: $total)"
            done

            echo "  ✅ $table_name done — $total total rows"
          }

          # ── release_group ──
          batch_insert_by_id "release_group" \
            "INSERT INTO musicbrainz.release_group (id, gid, name, artist_credit, type, comment)
             SELECT id, gid, name, artist_credit, type, COALESCE(comment, '')
             FROM mb_staging.release_group
             WHERE id >= __START__ AND id < __END__
             ON CONFLICT (id) DO NOTHING;"

          psql_retry "$CONNSTR" -c "
            SELECT setval(pg_get_serial_sequence('musicbrainz.release_group', 'id'),
                          COALESCE((SELECT MAX(id) FROM musicbrainz.release_group), 1));"

          # ── release (complex join — batch by release id) ──
          batch_insert_by_id "release" \
            "INSERT INTO musicbrainz.release (id, gid, name, artist_credit, release_group,
                                              date_year, date_month, date_day, country, label, comment)
             SELECT r.id, r.gid, r.name, r.artist_credit, r.release_group,
                    rc.date_year, rc.date_month, rc.date_day, rc.country,
                    rl.label,
                    COALESCE(r.comment, '')
             FROM mb_staging.release r
             LEFT JOIN LATERAL (
               SELECT country, date_year, date_month, date_day
               FROM mb_staging.release_country
               WHERE release = r.id
               ORDER BY date_year NULLS LAST
               LIMIT 1
             ) rc ON true
             LEFT JOIN LATERAL (
               SELECT label
               FROM mb_staging.release_label
               WHERE release = r.id
               LIMIT 1
             ) rl ON true
             WHERE r.id >= __START__ AND r.id < __END__
             ON CONFLICT (id) DO NOTHING;"

          psql_retry "$CONNSTR" -c "
            SELECT setval(pg_get_serial_sequence('musicbrainz.release', 'id'),
                          COALESCE((SELECT MAX(id) FROM musicbrainz.release), 1));"

          # ── label (smaller table — single insert with retry) ──
          psql_retry "$CONNSTR" -c "
            SET session_replication_role = 'replica';
            SET statement_timeout = 0;
            INSERT INTO musicbrainz.label (id, gid, name, type, area, begin_date_year, end_date_year, comment)
            SELECT id, gid, name, type, area, begin_date_year, end_date_year, COALESCE(comment, '')
            FROM mb_staging.label
            ON CONFLICT (id) DO NOTHING;"

          psql_retry "$CONNSTR" -c "
            SELECT setval(pg_get_serial_sequence('musicbrainz.label', 'id'),
                          COALESCE((SELECT MAX(id) FROM musicbrainz.label), 1));"

          # ── work ──
          batch_insert_by_id "work" \
            "INSERT INTO musicbrainz.work (id, gid, name, type, comment)
             SELECT id, gid, name, type, COALESCE(comment, '')
             FROM mb_staging.work
             WHERE id >= __START__ AND id < __END__
             ON CONFLICT (id) DO NOTHING;"

          psql_retry "$CONNSTR" -c "
            SELECT setval(pg_get_serial_sequence('musicbrainz.work', 'id'),
                          COALESCE((SELECT MAX(id) FROM musicbrainz.work), 1));"

          # ── artist_credit ──
          batch_insert_by_id "artist_credit" \
            "INSERT INTO musicbrainz.artist_credit (id, name, artist_count)
             SELECT id, name, artist_count FROM mb_staging.artist_credit
             WHERE id >= __START__ AND id < __END__
             ON CONFLICT (id) DO NOTHING;"

          psql_retry "$CONNSTR" -c "
            SELECT setval(pg_get_serial_sequence('musicbrainz.artist_credit', 'id'),
                          COALESCE((SELECT MAX(id) FROM musicbrainz.artist_credit), 1));"

          # ── artist_credit_name (no id column — use artist_credit as range key) ──
          echo "  📥 Inserting artist_credit_name …"
          MIN_AC=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COALESCE(min(artist_credit), 0) FROM mb_staging.artist_credit_name")
          MAX_AC=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COALESCE(max(artist_credit), 0) FROM mb_staging.artist_credit_name")
          ACN_TOTAL=0

          for (( s=MIN_AC; s<=MAX_AC; s+=BATCH )); do
            e=$((s + BATCH))
            rows=$(psql_retry_capture "$CONNSTR" -t -A -c "
              SET session_replication_role = 'replica';
              SET statement_timeout = 0;
              INSERT INTO musicbrainz.artist_credit_name (artist_credit, position, artist, name)
              SELECT artist_credit, position, artist, name
              FROM mb_staging.artist_credit_name
              WHERE artist_credit >= $s AND artist_credit < $e
              ON CONFLICT DO NOTHING;
            ")
            count=$(echo "$rows" | tail -1 | grep -oE '[0-9]+' | tail -1 || echo 0)
            ACN_TOTAL=$((ACN_TOTAL + count))
            echo "    ✅ artist_credit [$s, $e) — $count rows (cumulative: $ACN_TOTAL)"
          done
          echo "  ✅ artist_credit_name done — $ACN_TOTAL total rows"

          # ── genre (small table) ──
          psql_retry "$CONNSTR" -c "
            SET session_replication_role = 'replica';
            SET statement_timeout = 0;
            INSERT INTO musicbrainz.genre (id, gid, name)
            SELECT id, gid, name FROM mb_staging.genre
            ON CONFLICT (id) DO NOTHING;"

          psql_retry "$CONNSTR" -c "
            SELECT setval(pg_get_serial_sequence('musicbrainz.genre', 'id'),
                          COALESCE((SELECT MAX(id) FROM musicbrainz.genre), 1));"

          # ── tag (small-ish table) ──
          psql_retry "$CONNSTR" -c "
            SET session_replication_role = 'replica';
            SET statement_timeout = 0;
            INSERT INTO musicbrainz.tag (id, name)
            SELECT id, name FROM mb_staging.tag
            ON CONFLICT (id) DO NOTHING;"

          psql_retry "$CONNSTR" -c "
            SELECT setval(pg_get_serial_sequence('musicbrainz.tag', 'id'),
                          COALESCE((SELECT MAX(id) FROM musicbrainz.tag), 1));"

          # ── artist_tag ──
          echo "  📥 Inserting artist_tag …"
          MIN_AT=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COALESCE(min(artist), 0) FROM mb_staging.artist_tag")
          MAX_AT=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COALESCE(max(artist), 0) FROM mb_staging.artist_tag")
          AT_TOTAL=0

          for (( s=MIN_AT; s<=MAX_AT; s+=BATCH )); do
            e=$((s + BATCH))
            rows=$(psql_retry_capture "$CONNSTR" -t -A -c "
              SET session_replication_role = 'replica';
              SET statement_timeout = 0;
              INSERT INTO musicbrainz.artist_tag (artist, tag, count)
              SELECT artist, tag, count FROM mb_staging.artist_tag
              WHERE artist >= $s AND artist < $e
              ON CONFLICT DO NOTHING;
            ")
            count=$(echo "$rows" | tail -1 | grep -oE '[0-9]+' | tail -1 || echo 0)
            AT_TOTAL=$((AT_TOTAL + count))
            echo "    ✅ artist [$s, $e) — $count rows (cumulative: $AT_TOTAL)"
          done
          echo "  ✅ artist_tag done — $AT_TOTAL total rows"

          # ── link_type (small table) ──
          psql_retry "$CONNSTR" -c "
            SET session_replication_role = 'replica';
            SET statement_timeout = 0;
            INSERT INTO musicbrainz.link_type (id, gid, name, entity_type0, entity_type1, description)
            SELECT id, gid, name, entity_type0, entity_type1, COALESCE(description, '')
            FROM mb_staging.link_type
            ON CONFLICT (id) DO NOTHING;"

          psql_retry "$CONNSTR" -c "
            SELECT setval(pg_get_serial_sequence('musicbrainz.link_type', 'id'),
                          COALESCE((SELECT MAX(id) FROM musicbrainz.link_type), 1));"

          # ── l_artist_artist ──
          psql_retry "$CONNSTR" -c "
            SET session_replication_role = 'replica';
            SET statement_timeout = 0;
            INSERT INTO musicbrainz.l_artist_artist (id, entity0, entity1, link_type, begin_date_year, end_date_year)
            SELECT laa.id, laa.entity0, laa.entity1, l.link_type, l.begin_date_year, l.end_date_year
            FROM mb_staging.l_artist_artist laa
            JOIN mb_staging.link l ON l.id = laa.link
            ON CONFLICT (id) DO NOTHING;"

          psql_retry "$CONNSTR" -c "
            SELECT setval(pg_get_serial_sequence('musicbrainz.l_artist_artist', 'id'),
                          COALESCE((SELECT MAX(id) FROM musicbrainz.l_artist_artist), 1));"

          echo "✅ Part 2 done at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        env:
          PGCONNECT_TIMEOUT: '30'

      - name: "Transform: batch-insert l_artist_recording"
        run: |
          source /tmp/psql_retry.sh
          CONNSTR="${{ steps.pg.outputs.connstr }}"
          BATCH=500000

          MIN_ID=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COALESCE(min(id), 0) FROM mb_staging.l_artist_recording")
          MAX_ID=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COALESCE(max(id), 0) FROM mb_staging.l_artist_recording")

          echo "📥 Batch-inserting l_artist_recording rows (id $MIN_ID → $MAX_ID, batch size $BATCH) …"
          echo "   Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          TOTAL=0

          for (( start=MIN_ID; start<=MAX_ID; start+=BATCH )); do
            END=$((start + BATCH))
            ROWS=$(psql_retry_capture "$CONNSTR" -t -A -c "
              SET session_replication_role = 'replica';
              SET statement_timeout = 0;
              INSERT INTO musicbrainz.l_artist_recording (id, entity0, entity1, link_type)
              SELECT lar.id, lar.entity0, lar.entity1, l.link_type
              FROM mb_staging.l_artist_recording lar
              JOIN mb_staging.link l ON l.id = lar.link
              WHERE lar.id >= $start AND lar.id < $END
              ON CONFLICT (id) DO NOTHING;
            ")
            COUNT=$(echo "$ROWS" | tail -1 | grep -oE '[0-9]+' | tail -1 || echo 0)
            TOTAL=$((TOTAL + COUNT))
            echo "   ✅ id [$start, $END) — $COUNT rows (cumulative: $TOTAL)"
          done

          echo "✅ l_artist_recording done — $TOTAL total rows at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        env:
          PGCONNECT_TIMEOUT: '30'

      - name: "Transform: final link tables & cleanup"
        run: |
          source /tmp/psql_retry.sh
          CONNSTR="${{ steps.pg.outputs.connstr }}"
          BATCH=500000

          echo "🔄 Part 3 — l_artist_release … l_artist_work … drop staging …"
          echo "   Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          # ── Reset l_artist_recording sequence ──
          psql_retry "$CONNSTR" -c "
            SELECT setval(pg_get_serial_sequence('musicbrainz.l_artist_recording', 'id'),
                          COALESCE((SELECT MAX(id) FROM musicbrainz.l_artist_recording), 1));"

          # ── l_artist_release (batch by id) ──
          MIN_ID=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COALESCE(min(id), 0) FROM mb_staging.l_artist_release")
          MAX_ID=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COALESCE(max(id), 0) FROM mb_staging.l_artist_release")
          echo "  📥 Batch-inserting l_artist_release (id $MIN_ID → $MAX_ID) …"
          TOTAL=0

          for (( s=MIN_ID; s<=MAX_ID; s+=BATCH )); do
            e=$((s + BATCH))
            rows=$(psql_retry_capture "$CONNSTR" -t -A -c "
              SET session_replication_role = 'replica';
              SET statement_timeout = 0;
              INSERT INTO musicbrainz.l_artist_release (id, entity0, entity1, link_type)
              SELECT lar.id, lar.entity0, lar.entity1, l.link_type
              FROM mb_staging.l_artist_release lar
              JOIN mb_staging.link l ON l.id = lar.link
              WHERE lar.id >= $s AND lar.id < $e
              ON CONFLICT (id) DO NOTHING;
            ")
            count=$(echo "$rows" | tail -1 | grep -oE '[0-9]+' | tail -1 || echo 0)
            TOTAL=$((TOTAL + count))
            echo "    ✅ id [$s, $e) — $count rows (cumulative: $TOTAL)"
          done
          echo "  ✅ l_artist_release done — $TOTAL total rows"

          psql_retry "$CONNSTR" -c "
            SELECT setval(pg_get_serial_sequence('musicbrainz.l_artist_release', 'id'),
                          COALESCE((SELECT MAX(id) FROM musicbrainz.l_artist_release), 1));"

          # ── l_artist_work (batch by id) ──
          MIN_ID=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COALESCE(min(id), 0) FROM mb_staging.l_artist_work")
          MAX_ID=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COALESCE(max(id), 0) FROM mb_staging.l_artist_work")
          echo "  📥 Batch-inserting l_artist_work (id $MIN_ID → $MAX_ID) …"
          TOTAL=0

          for (( s=MIN_ID; s<=MAX_ID; s+=BATCH )); do
            e=$((s + BATCH))
            rows=$(psql_retry_capture "$CONNSTR" -t -A -c "
              SET session_replication_role = 'replica';
              SET statement_timeout = 0;
              INSERT INTO musicbrainz.l_artist_work (id, entity0, entity1, link_type)
              SELECT law.id, law.entity0, law.entity1, l.link_type
              FROM mb_staging.l_artist_work law
              JOIN mb_staging.link l ON l.id = law.link
              WHERE law.id >= $s AND law.id < $e
              ON CONFLICT (id) DO NOTHING;
            ")
            count=$(echo "$rows" | tail -1 | grep -oE '[0-9]+' | tail -1 || echo 0)
            TOTAL=$((TOTAL + count))
            echo "    ✅ id [$s, $e) — $count rows (cumulative: $TOTAL)"
          done
          echo "  ✅ l_artist_work done — $TOTAL total rows"

          psql_retry "$CONNSTR" -c "
            SELECT setval(pg_get_serial_sequence('musicbrainz.l_artist_work', 'id'),
                          COALESCE((SELECT MAX(id) FROM musicbrainz.l_artist_work), 1));"

          # ── Re-enable triggers ──
          psql_retry "$CONNSTR" -c "SET session_replication_role = 'origin';"

          # ── Drop staging schema ──
          psql_retry "$CONNSTR" -c "DROP SCHEMA mb_staging CASCADE;"

          echo "✅ Transform complete at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        env:
          PGCONNECT_TIMEOUT: '30'

      # ────────────────────────────────────────────────────────────────────────
      # 10. Verify import
      # ────────────────────────────────────────────────────────────────────────
      - name: Verify row counts
        run: |
          source /tmp/psql_retry.sh
          psql_retry "${{ steps.pg.outputs.connstr }}" <<'EOF'
          SELECT 'artist'            AS tbl, COUNT(*) AS rows FROM musicbrainz.artist
          UNION ALL
          SELECT 'recording',        COUNT(*) FROM musicbrainz.recording
          UNION ALL
          SELECT 'release',          COUNT(*) FROM musicbrainz.release
          UNION ALL
          SELECT 'release_group',    COUNT(*) FROM musicbrainz.release_group
          UNION ALL
          SELECT 'label',            COUNT(*) FROM musicbrainz.label
          UNION ALL
          SELECT 'work',             COUNT(*) FROM musicbrainz.work
          UNION ALL
          SELECT 'area',             COUNT(*) FROM musicbrainz.area
          UNION ALL
          SELECT 'genre',            COUNT(*) FROM musicbrainz.genre
          UNION ALL
          SELECT 'tag',              COUNT(*) FROM musicbrainz.tag
          UNION ALL
          SELECT 'artist_tag',       COUNT(*) FROM musicbrainz.artist_tag
          UNION ALL
          SELECT 'artist_credit',    COUNT(*) FROM musicbrainz.artist_credit
          UNION ALL
          SELECT 'link_type',        COUNT(*) FROM musicbrainz.link_type
          UNION ALL
          SELECT 'l_artist_artist',  COUNT(*) FROM musicbrainz.l_artist_artist
          UNION ALL
          SELECT 'l_artist_recording', COUNT(*) FROM musicbrainz.l_artist_recording
          UNION ALL
          SELECT 'l_artist_release', COUNT(*) FROM musicbrainz.l_artist_release
          UNION ALL
          SELECT 'l_artist_work',    COUNT(*) FROM musicbrainz.l_artist_work
          ORDER BY tbl;
          EOF
        env:
          PGCONNECT_TIMEOUT: '30'

      # ────────────────────────────────────────────────────────────────────────
      # 11. Clean up workspace
      # ────────────────────────────────────────────────────────────────────────
      - name: Clean up
        if: always()
        run: rm -rf mbdump mbdump.tar.bz2
