name: Import MusicBrainz Data

# Downloads the latest MusicBrainz full-export dump and loads the subset of
# tables used by the Music Intelligence Graph demo into PostgreSQL.
#
# Data source: https://data.metabrainz.org/pub/musicbrainz/data/fullexport/
#
# Required secrets (same as deploy workflow):
#   PG_HOST  /  PG_DATABASE  /  PG_USER  /  PG_PASSWORD  /  PG_SSLMODE
#   — or —
#   PG_ADMIN_PASSWORD  (uses defaults: host from last deploy, db=musicbrainz,
#                       user=pgadmin, sslmode=require)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'MusicBrainz full-export base URL'
        required: false
        default: 'https://data.metabrainz.org/pub/musicbrainz/data/fullexport'
      skip_download:
        description: 'Skip download/extract/staging-load — resume transforms from existing staging data'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  BASE_URL: ${{ inputs.base_url || 'https://data.metabrainz.org/pub/musicbrainz/data/fullexport' }}
  AZURE_SECRETS_CONFIGURED: ${{ secrets.AZURE_CLIENT_ID != '' && secrets.AZURE_TENANT_ID != '' && secrets.AZURE_SUBSCRIPTION_ID != '' && secrets.AZURE_RESOURCE_GROUP != '' }}
  REQUIRED_AZURE_EXTENSIONS: 'age,vector'
  REQUIRED_SHARED_PRELOAD_LIBRARIES: 'age'

jobs:
  import:
    runs-on: ubuntu-latest
    timeout-minutes: 720            # full dump can take a while

    steps:
      # ────────────────────────────────────────────────────────────────────────
      # 1. Checkout (we need the SQL helper scripts)
      # ────────────────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      # ────────────────────────────────────────────────────────────────────────
      # 2. Resolve PostgreSQL connection
      # ────────────────────────────────────────────────────────────────────────
      - name: Resolve PostgreSQL connection settings
        id: pg
        run: |
          RESOLVED_PGHOST="${{ secrets.PG_HOST }}"
          RESOLVED_PGDATABASE="${{ secrets.PG_DATABASE }}"
          if [ -z "$RESOLVED_PGDATABASE" ]; then
            RESOLVED_PGDATABASE="musicbrainz"
          fi
          RESOLVED_PGUSER="${{ secrets.PG_USER }}"
          if [ -z "$RESOLVED_PGUSER" ]; then
            RESOLVED_PGUSER="pgadmin"
          fi
          RESOLVED_PGPASSWORD="${{ secrets.PG_PASSWORD }}"
          if [ -z "$RESOLVED_PGPASSWORD" ]; then
            RESOLVED_PGPASSWORD="${{ secrets.PG_ADMIN_PASSWORD }}"
          fi
          RESOLVED_PGSSLMODE="${{ secrets.PG_SSLMODE }}"
          if [ -z "$RESOLVED_PGSSLMODE" ]; then
            RESOLVED_PGSSLMODE="require"
          fi
          # Extract Azure PostgreSQL server name from FQDN
          # (e.g. "myserver" from "myserver.postgres.database.azure.com").
          if [[ "$RESOLVED_PGHOST" == *.postgres.database.azure.com ]]; then
            RESOLVED_PGSERVER="${RESOLVED_PGHOST%%.*}"
          else
            RESOLVED_PGSERVER="$RESOLVED_PGHOST"
          fi

          if [ -z "$RESOLVED_PGHOST" ]; then
            echo "::error::PG_HOST secret is not set. Cannot connect to PostgreSQL."
            exit 1
          fi
          if [ -z "$RESOLVED_PGPASSWORD" ]; then
            echo "::error::PG_PASSWORD (or PG_ADMIN_PASSWORD) secret is not set."
            exit 1
          fi

          # Build a connection string with TCP keepalive parameters to prevent
          # the server / load-balancer from closing idle connections.
          # Also set statement_timeout and idle_in_transaction_session_timeout to 0
          # at the connection level so Azure PostgreSQL does not kill long-running
          # batch operations.
          echo "::add-mask::$RESOLVED_PGPASSWORD"
          CONNSTR="host=$RESOLVED_PGHOST dbname=$RESOLVED_PGDATABASE user=$RESOLVED_PGUSER password=$RESOLVED_PGPASSWORD sslmode=$RESOLVED_PGSSLMODE keepalives=1 keepalives_idle=30 keepalives_interval=10 keepalives_count=5 options='-c statement_timeout=0 -c idle_in_transaction_session_timeout=0'"
          echo "connstr=$CONNSTR" >> "$GITHUB_OUTPUT"
          echo "pgServer=$RESOLVED_PGSERVER" >> "$GITHUB_OUTPUT"

          echo "✅ PostgreSQL: host=$RESOLVED_PGHOST server=$RESOLVED_PGSERVER db=$RESOLVED_PGDATABASE user=$RESOLVED_PGUSER ssl=$RESOLVED_PGSSLMODE (keepalives enabled)"

      # ────────────────────────────────────────────────────────────────────────
      # 3. Discover the latest dump
      # ────────────────────────────────────────────────────────────────────────
      - name: Discover latest MusicBrainz dump
        if: ${{ !inputs.skip_download }}
        id: latest
        run: |
          LATEST="$(curl -sSf "${{ env.BASE_URL }}/LATEST")"
          LATEST="$(echo "$LATEST" | tr -d '[:space:]')"
          echo "dump=$LATEST" >> "$GITHUB_OUTPUT"
          echo "📦 Latest dump: $LATEST"

      # ────────────────────────────────────────────────────────────────────────
      # 4. Download and extract only the tables we need
      # ────────────────────────────────────────────────────────────────────────
      - name: Download dump archives
        if: ${{ !inputs.skip_download }}
        run: |
          DUMP_BASE="${{ env.BASE_URL }}/${{ steps.latest.outputs.dump }}"

          echo "⬇️  Downloading mbdump.tar.bz2 …"
          echo "   URL: $DUMP_BASE/mbdump.tar.bz2"
          echo "   Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          curl -fL --progress-bar -o mbdump.tar.bz2 "$DUMP_BASE/mbdump.tar.bz2"
          echo "   Finished at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          ls -lh mbdump.tar.bz2

          # tag and artist_tag live in the derived dump
          echo "⬇️  Downloading mbdump-derived.tar.bz2 …"
          echo "   URL: $DUMP_BASE/mbdump-derived.tar.bz2"
          echo "   Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          curl -fL --progress-bar -o mbdump-derived.tar.bz2 "$DUMP_BASE/mbdump-derived.tar.bz2"
          echo "   Finished at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          ls -lh mbdump-derived.tar.bz2

      - name: Extract required table files
        if: ${{ !inputs.skip_download }}
        run: |
          # Tables in mbdump.tar.bz2
          CORE_TABLES=(
            artist
            artist_type
            area
            recording
            release_group
            release
            release_country
            release_label
            label
            work
            artist_credit
            artist_credit_name
            genre
            l_artist_artist
            l_artist_recording
            l_artist_release
            l_artist_work
            link
            link_type
          )

          # Tables in mbdump-derived.tar.bz2
          DERIVED_TABLES=(
            tag
            artist_tag
          )

          # Extract core tables
          PATHS=()
          for t in "${CORE_TABLES[@]}"; do
            PATHS+=("mbdump/$t")
          done
          echo "📂 Extracting ${#PATHS[@]} core table files …"
          echo "   Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          tar -xjvf mbdump.tar.bz2 "${PATHS[@]}"
          echo "   Finished at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          # Extract derived tables
          PATHS=()
          for t in "${DERIVED_TABLES[@]}"; do
            PATHS+=("mbdump/$t")
          done
          echo "📂 Extracting ${#PATHS[@]} derived table files …"
          echo "   Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          tar -xjvf mbdump-derived.tar.bz2 "${PATHS[@]}"
          echo "   Finished at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          echo ""
          echo "📊 Extracted file sizes:"
          ls -lhS mbdump/

          # Free disk space
          rm -f mbdump.tar.bz2 mbdump-derived.tar.bz2
          echo "🗑️  Removed archive files to free disk space"
          df -h . | tail -1 | awk '{print "💾 Available disk space: " $4}'

      # ────────────────────────────────────────────────────────────────────────
      # 5. Create reusable retry helper script
      # ────────────────────────────────────────────────────────────────────────
      - name: Create retry helper
        run: |
          cat > /tmp/psql_retry.sh << 'SCRIPT'
          #!/usr/bin/env bash
          # psql_retry.sh — runs a psql command with retry + exponential backoff.
          # Usage: source /tmp/psql_retry.sh
          #        psql_retry <connstr> [psql args ...]
          #
          # Environment:
          #   RETRY_MAX   — max attempts (default 8)
          #   RETRY_DELAY — initial delay in seconds (default 10)

          psql_retry() {
            local connstr="$1"; shift
            local max_attempts="${RETRY_MAX:-8}"
            local delay="${RETRY_DELAY:-10}"

            for (( attempt=1; attempt<=max_attempts; attempt++ )); do
              set +e
              psql "$connstr" "$@"
              local rc=$?
              set -e
              if [ "$rc" -eq 0 ]; then
                return 0
              fi
              if [ "$attempt" -eq "$max_attempts" ]; then
                echo "::error::psql failed after $max_attempts attempts (exit code $rc)"
                return $rc
              fi
              echo "⚠️  psql failed (exit $rc) — retrying in ${delay}s (attempt $attempt/$max_attempts) …"
              sleep "$delay"
              delay=$((delay * 2))
            done
          }

          # Variant that captures stdout while still retrying.
          psql_retry_capture() {
            local connstr="$1"; shift
            local max_attempts="${RETRY_MAX:-8}"
            local delay="${RETRY_DELAY:-10}"
            local tmpfile
            tmpfile=$(mktemp)

            for (( attempt=1; attempt<=max_attempts; attempt++ )); do
              set +e
              psql "$connstr" "$@" > "$tmpfile" 2>&1
              local rc=$?
              set -e
              if [ "$rc" -eq 0 ]; then
                cat "$tmpfile"
                rm -f "$tmpfile"
                return 0
              fi
              if [ "$attempt" -eq "$max_attempts" ]; then
                cat "$tmpfile"
                rm -f "$tmpfile"
                echo "::error::psql failed after $max_attempts attempts (exit code $rc)"
                return $rc
              fi
              echo "⚠️  psql failed (exit $rc) — retrying in ${delay}s (attempt $attempt/$max_attempts) …" >&2
              sleep "$delay"
              delay=$((delay * 2))
            done
          }
          # Resumable batch-insert helper.
          # Usage: batch_insert_resumable <connstr> <batch_size> <staging_table>
          #            <target_table> <range_column> <insert_sql_template>
          # The insert_sql_template must contain __START__ and __END__ placeholders.
          batch_insert_resumable() {
            local connstr="$1"
            local batch_size="$2"
            local staging_table="$3"
            local target_table="$4"
            local range_column="$5"
            local insert_sql_template="$6"

            local min_id max_id last_loaded resume_from
            min_id=$(psql_retry_capture "$connstr" -t -A -c \
              "SELECT COALESCE(min($range_column), 0) FROM mb_staging.$staging_table")
            max_id=$(psql_retry_capture "$connstr" -t -A -c \
              "SELECT COALESCE(max($range_column), 0) FROM mb_staging.$staging_table")

            # Resume: check how far the target table already got
            last_loaded=$(psql_retry_capture "$connstr" -t -A -c \
              "SELECT COALESCE(max($range_column), 0) FROM musicbrainz.$target_table")
            if [ "$last_loaded" -gt "$min_id" ]; then
              resume_from=$(( (last_loaded / batch_size) * batch_size ))
              if [ "$resume_from" -lt "$min_id" ]; then
                resume_from=$min_id
              fi
              echo "  ♻️  Resuming $target_table — last $range_column=$last_loaded, restarting from batch boundary $resume_from"
            else
              resume_from=$min_id
            fi

            echo "  📥 Batch-inserting $target_table ($range_column $resume_from → $max_id, batch $batch_size) …"
            local total=0

            for (( s=resume_from; s<=max_id; s+=batch_size )); do
              local e=$((s + batch_size))
              local sql="${insert_sql_template//__START__/$s}"
              sql="${sql//__END__/$e}"
              local rows
              rows=$(psql_retry_capture "$connstr" -t -A -c "
                SET session_replication_role = 'replica';
                SET statement_timeout = 0;
                $sql
              ")
              local count
              count=$(echo "$rows" | tail -1 | grep -oE '[0-9]+' | tail -1 || echo 0)
              total=$((total + count))
              echo "    ✅ $range_column [$s, $e) — $count rows (cumulative: $total)"
              sleep 0.5
            done

            echo "  ✅ $target_table done — $total total rows"
          }
          SCRIPT
          chmod +x /tmp/psql_retry.sh
          echo "✅ Retry helper created"

      # ────────────────────────────────────────────────────────────────────────
      # 6. Ensure required PostgreSQL extensions are allow-listed
      # ────────────────────────────────────────────────────────────────────────
      - name: Azure Login (OIDC)
        if: ${{ fromJSON(env.AZURE_SECRETS_CONFIGURED) }}
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure extension allow-list (Azure PostgreSQL)
        if: ${{ fromJSON(env.AZURE_SECRETS_CONFIGURED) }}
        run: |
          az postgres flexible-server parameter set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --server-name "${{ steps.pg.outputs.pgServer }}" \
            --name azure.extensions \
            --value "${{ env.REQUIRED_AZURE_EXTENSIONS }}"
          az postgres flexible-server parameter set \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --server-name "${{ steps.pg.outputs.pgServer }}" \
            --name shared_preload_libraries \
            --value "${{ env.REQUIRED_SHARED_PRELOAD_LIBRARIES }}"

      - name: Restart PostgreSQL server (shared_preload_libraries requires restart)
        if: ${{ fromJSON(env.AZURE_SECRETS_CONFIGURED) }}
        run: |
          echo "🔄 Restarting PostgreSQL server to apply shared_preload_libraries change…"
          az postgres flexible-server restart \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --name "${{ steps.pg.outputs.pgServer }}"
          INITIAL_WAIT=30
          MAX_ATTEMPTS=30
          POLL_INTERVAL=10
          echo "⏳ Waiting ${INITIAL_WAIT}s for server to begin restarting…"
          sleep "$INITIAL_WAIT"
          # Poll until the server accepts connections
          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            if PGCONNECT_TIMEOUT=10 psql "${{ steps.pg.outputs.connstr }}" -c "SELECT 1" >/dev/null 2>&1; then
              echo "✅ Server is back online."
              break
            fi
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "❌ Server did not come back online after $MAX_ATTEMPTS poll attempts." >&2
              exit 1
            fi
            echo "  …still waiting (attempt $i/$MAX_ATTEMPTS)"
            sleep "$POLL_INTERVAL"
          done

      - name: Verify required extension allow-list settings
        run: |
          source /tmp/psql_retry.sh
          # NOTE: psql variable substitution (:'var') is NOT performed inside
          # dollar-quoted blocks ($$ ... $$), so the required values must be
          # interpolated by the shell directly into the SQL text. Validate the
          # inputs against a strict allow-list of characters (PostgreSQL
          # extension/library names: alphanumerics, underscore, separators)
          # before embedding them in the SQL string to guard against injection.
          REQUIRED_EXT_LITERAL="${REQUIRED_AZURE_EXTENSIONS}"
          REQUIRED_PRELOAD_LITERAL="${REQUIRED_SHARED_PRELOAD_LIBRARIES}"
          if [[ ! "$REQUIRED_EXT_LITERAL" =~ ^[A-Za-z0-9_,[:space:]]*$ ]]; then
            echo "❌ REQUIRED_AZURE_EXTENSIONS contains unexpected characters: $REQUIRED_EXT_LITERAL" >&2
            exit 1
          fi
          if [[ ! "$REQUIRED_PRELOAD_LITERAL" =~ ^[A-Za-z0-9_,[:space:]]*$ ]]; then
            echo "❌ REQUIRED_SHARED_PRELOAD_LIBRARIES contains unexpected characters: $REQUIRED_PRELOAD_LITERAL" >&2
            exit 1
          fi
          psql_retry "${{ steps.pg.outputs.connstr }}" \
            -v ON_ERROR_STOP=1 \
            -c "
            DO \$\$
            DECLARE
              ext_setting text := lower(coalesce(current_setting('azure.extensions', true), ''));
              preload_setting text := lower(coalesce(current_setting('shared_preload_libraries', true), ''));
              ext_values text[] := array_remove(regexp_split_to_array(ext_setting, '[,[:space:]]+'), '');
              preload_values text[] := array_remove(regexp_split_to_array(preload_setting, '[,[:space:]]+'), '');
              required_ext_values text[] := array_remove(regexp_split_to_array(lower('${REQUIRED_EXT_LITERAL}'), '[,[:space:]]+'), '');
              required_preload_values text[] := array_remove(regexp_split_to_array(lower('${REQUIRED_PRELOAD_LITERAL}'), '[,[:space:]]+'), '');
              required_name text;
            BEGIN
              FOREACH required_name IN ARRAY required_ext_values LOOP
                IF required_name <> '' AND NOT (required_name = ANY (ext_values)) THEN
                  RAISE EXCEPTION 'Required extension % is not in the allow-list. Current azure.extensions=%', required_name, ext_setting;
                END IF;
              END LOOP;
              FOREACH required_name IN ARRAY required_preload_values LOOP
                IF required_name <> '' AND NOT (required_name = ANY (preload_values)) THEN
                  RAISE EXCEPTION 'Required preload library % is not enabled in shared_preload_libraries. Current value=%', required_name, preload_setting;
                END IF;
              END LOOP;
            END
            \$\$;"
        env:
          PGCONNECT_TIMEOUT: '30'

      # ────────────────────────────────────────────────────────────────────────
      # 7. Ensure demo schema exists
      # ────────────────────────────────────────────────────────────────────────
      - name: Ensure demo schema exists
        run: |
          source /tmp/psql_retry.sh
          psql_retry "${{ steps.pg.outputs.connstr }}" -v ON_ERROR_STOP=1 -f server/src/db/initSchema.sql
        env:
          PGCONNECT_TIMEOUT: '30'

      # ────────────────────────────────────────────────────────────────────────
      # 8. Create staging tables
      # ────────────────────────────────────────────────────────────────────────
      - name: Create staging tables
        if: ${{ !inputs.skip_download }}
        run: |
          source /tmp/psql_retry.sh
          psql_retry "${{ steps.pg.outputs.connstr }}" -f server/src/db/mb_staging_create.sql
        env:
          PGCONNECT_TIMEOUT: '30'

      # ────────────────────────────────────────────────────────────────────────
      # 9. COPY dump data into staging tables
      # ────────────────────────────────────────────────────────────────────────
      - name: Load dump files into staging tables
        if: ${{ !inputs.skip_download }}
        run: |
          source /tmp/psql_retry.sh
          CONNSTR="${{ steps.pg.outputs.connstr }}"
          TABLES=(
            artist
            artist_type
            area
            recording
            release_group
            release
            release_country
            release_label
            label
            work
            artist_credit
            artist_credit_name
            genre
            tag
            artist_tag
            l_artist_artist
            l_artist_recording
            l_artist_release
            l_artist_work
            link
            link_type
          )

          TOTAL=${#TABLES[@]}
          CURRENT=0
          IMPORT_START=$(date +%s)
          echo "🚀 Starting import of $TOTAL tables at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""

          for t in "${TABLES[@]}"; do
            CURRENT=$((CURRENT + 1))
            FILE="mbdump/$t"
            if [ ! -f "$FILE" ]; then
              echo "⚠️  [$CURRENT/$TOTAL] Skipping $t — file not found"
              continue
            fi

            FILE_SIZE=$(ls -lh "$FILE" | awk '{print $5}')
            ROW_COUNT=$(wc -l < "$FILE")
            echo "📥 [$CURRENT/$TOTAL] Loading $t ($ROW_COUNT rows, $FILE_SIZE) …"
            TABLE_START=$(date +%s)

            psql_retry "$CONNSTR" -c "\\copy mb_staging.$t FROM '$FILE'"

            TABLE_END=$(date +%s)
            TABLE_ELAPSED=$((TABLE_END - TABLE_START))
            TOTAL_ELAPSED=$((TABLE_END - IMPORT_START))
            DB_ROWS=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COUNT(*) FROM mb_staging.$t")
            echo "   ✅ $t loaded — $DB_ROWS rows in DB — took ${TABLE_ELAPSED}s (total elapsed: ${TOTAL_ELAPSED}s)"
          done

          IMPORT_END=$(date +%s)
          TOTAL_TIME=$((IMPORT_END - IMPORT_START))
          echo ""
          echo "🏁 All tables loaded in ${TOTAL_TIME}s (finished at $(date -u '+%Y-%m-%d %H:%M:%S UTC'))"
        env:
          PGCONNECT_TIMEOUT: '30'

      # ────────────────────────────────────────────────────────────────────────
      # 9b. Create staging indexes for transform performance
      # ────────────────────────────────────────────────────────────────────────
      - name: Create staging indexes for transform performance
        if: ${{ !inputs.skip_download }}
        run: |
          source /tmp/psql_retry.sh
          CONNSTR="${{ steps.pg.outputs.connstr }}"

          echo "🔑 Creating staging indexes …"
          echo "   Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

          psql_retry "$CONNSTR" -c "CREATE INDEX IF NOT EXISTS idx_stg_release_country_release ON mb_staging.release_country (release);"
          echo "   ✅ idx_stg_release_country_release"

          psql_retry "$CONNSTR" -c "CREATE INDEX IF NOT EXISTS idx_stg_release_label_release ON mb_staging.release_label (release);"
          echo "   ✅ idx_stg_release_label_release"

          psql_retry "$CONNSTR" -c "CREATE INDEX IF NOT EXISTS idx_stg_link_id ON mb_staging.link (id);"
          echo "   ✅ idx_stg_link_id"

          echo "✅ Staging indexes created at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        env:
          PGCONNECT_TIMEOUT: '30'

      # ────────────────────────────────────────────────────────────────────────
      # 10. Transform staging → demo tables
      # ────────────────────────────────────────────────────────────────────────
      - name: "Transform: setup & core tables"
        run: |
          source /tmp/psql_retry.sh
          echo "🔄 Part 1 — Upsert artist / artist_type / area …"
          echo "   Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          psql_retry "${{ steps.pg.outputs.connstr }}" -e --set=ON_ERROR_STOP=1 \
            -f server/src/db/mb_staging_load_setup.sql
          echo "✅ Part 1 done at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        env:
          PGCONNECT_TIMEOUT: '30'

      - name: "Transform: batch-insert recording"
        run: |
          source /tmp/psql_retry.sh
          CONNSTR="${{ steps.pg.outputs.connstr }}"
          BATCH=200000

          MIN_ID=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COALESCE(min(id), 0) FROM mb_staging.recording")
          MAX_ID=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COALESCE(max(id), 0) FROM mb_staging.recording")

          # Resume from where a previous run left off
          LAST_LOADED=$(psql_retry_capture "$CONNSTR" -t -A -c "SELECT COALESCE(max(id), 0) FROM musicbrainz.recording")
          if [ "$LAST_LOADED" -gt "$MIN_ID" ]; then
            # Round down to the nearest batch boundary so we re-check the
            # last partial batch (ON CONFLICT DO NOTHING keeps it safe).
            RESUME_FROM=$(( (LAST_LOADED / BATCH) * BATCH ))
            # Ensure we don't go below the min staging id
            if [ "$RESUME_FROM" -lt "$MIN_ID" ]; then
              RESUME_FROM=$MIN_ID
            fi
            echo "♻️  Resuming recording import — last loaded id $LAST_LOADED, restarting from batch boundary $RESUME_FROM"
          else
            RESUME_FROM=$MIN_ID
          fi

          echo "📥 Batch-inserting recording rows (id $RESUME_FROM → $MAX_ID, batch size $BATCH) …"
          echo "   Started at: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          TOTAL=0

          for (( start=RESUME_FROM; start<=MAX_ID; start+=BATCH )); do
            END=$((start + BATCH))
            ROWS=$(psql_retry_capture "$CONNSTR" -t -A -c "
              SET session_replication_role = 'replica';
              SET statement_timeout = 0;
              INSERT INTO musicbrainz.recording (id, gid, name, artist_credit, length, comment)
              SELECT id, gid, name, artist_credit, length, COALESCE(comment, '')
              FROM mb_staging.recording
              WHERE id >= $start AND id < $END
              ON CONFLICT (id) DO NOTHING;
            ")
            COUNT=$(echo "$ROWS" | tail -1 | grep -oE '[0-9]+' | tail -1 || echo 0)
            TOTAL=$((TOTAL + COUNT))
            echo "   ✅ id [$start, $END) — $COUNT rows (cumulative: $TOTAL)"
            sleep 0.5
          done

          echo "✅ Recording done — $TOTAL total rows at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
        env:
          PGCONNECT_TIMEOUT: '30'

