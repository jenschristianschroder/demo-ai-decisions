name: Backfill Job — Control

# Start, stop, and inspect the Azure Container Apps Job that runs the
# MusicBrainz embeddings backfill (`ai-decisions-backfill`). This workflow
# replaces the long-running GitHub Actions backfill: the heavy work runs
# in Azure (no 6h cap, no public-internet PG tax), while this workflow
# is just a remote control surface.
#
# Required secrets:
#   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
#   AZURE_RESOURCE_GROUP

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'What to do'
        required: true
        type: choice
        options:
          - start
          - stop
          - status
          - logs
        default: status
      entity:
        description: 'Entity (start only): artist | recording | all'
        required: false
        type: choice
        options:
          - artist
          - recording
          - all
        default: artist
      batch_size:
        description: 'Inputs per Azure OpenAI embeddings call (start only)'
        required: false
        default: '128'
      concurrency:
        description: 'Concurrent embedding batches in flight (start only)'
        required: false
        default: '8'
      write_concurrency:
        description: 'Concurrent UPDATE writers (start only)'
        required: false
        default: '4'
      min_id:
        description: 'Resume from this id (start only, default 0)'
        required: false
        default: '0'
      max_id:
        description: 'Stop after this id (sharding; blank = no upper bound)'
        required: false
        default: ''
      limit:
        description: 'Hard cap on rows processed (start only; blank = no limit)'
        required: false
        default: ''
      drop_index:
        description: 'Drop & rebuild vector index around the run (faster but breaks vector queries while it runs)'
        required: false
        type: boolean
        default: false
      execution_name:
        description: 'Execution name (required for stop/logs)'
        required: false
        default: ''

permissions:
  id-token: write
  contents: read

env:
  JOB_NAME: ai-decisions-backfill

jobs:
  control:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify job exists
        run: |
          set -euo pipefail
          if ! az containerapp job show \
                --name "$JOB_NAME" \
                --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
                >/dev/null 2>&1; then
            echo "::error::Container Apps Job '$JOB_NAME' not found in resource group '${{ secrets.AZURE_RESOURCE_GROUP }}'. Has the deploy workflow run successfully?"
            exit 1
          fi

      # ────────────────────────────────────────────────────────────────────
      # Ensure the PostgreSQL server is running before starting a backfill
      # execution. Azure Flexible Server can be auto-paused or manually
      # stopped to save costs (the demo uses a Burstable SKU). Without
      # this check, the Container Apps Job opens a TCP connection that
      # never completes the handshake; pg-pool then aborts at
      # `connectionTimeoutMillis: 15_000` with
      #   "Error: Connection terminated due to connection timeout"
      # — exactly the failure mode observed for execution
      # `ai-decisions-backfill-o09hhky` (see backfill-embeddings.yml for
      # the equivalent guard that was added for the GHA-runner path).
      #
      # Only needed for `start`; `stop`, `status`, and `logs` talk to the
      # Container Apps control plane, not to PostgreSQL.
      # ────────────────────────────────────────────────────────────────────
      - name: Ensure PostgreSQL server is running
        if: inputs.action == 'start'
        env:
          PG_HOST_SECRET: ${{ secrets.PG_HOST }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
        run: |
          set -euo pipefail

          if [ -z "${PG_HOST_SECRET:-}" ]; then
            echo "⚠ PG_HOST secret is not set; skipping server state check (the job template's PGHOST will be used, but we cannot resolve the Flexible Server name from here)."
            exit 0
          fi

          # Derive the Azure Flexible Server name from the FQDN.
          # Format: <server-name>.postgres.database.azure.com
          PG_SERVER="${PG_HOST_SECRET%.postgres.database.azure.com}"
          if [ "$PG_SERVER" = "$PG_HOST_SECRET" ]; then
            echo "⚠ PG_HOST ($PG_HOST_SECRET) is not an Azure Flexible Server FQDN; skipping server state check."
            exit 0
          fi
          if [ -z "${AZURE_RESOURCE_GROUP:-}" ]; then
            echo "⚠ AZURE_RESOURCE_GROUP secret is not set; skipping server state check."
            exit 0
          fi

          SERVER_STATE=$(az postgres flexible-server show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$PG_SERVER" \
            --query "state" -o tsv 2>/dev/null || echo "Unknown")
          echo "Current server state: $SERVER_STATE"

          if [ "$SERVER_STATE" != "Ready" ]; then
            echo "🔄 Starting PostgreSQL server…"
            az postgres flexible-server start \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$PG_SERVER"
            echo "⏳ Waiting for server to become ready…"
            MAX_ATTEMPTS=30
            POLL_INTERVAL=10
            for i in $(seq 1 "$MAX_ATTEMPTS"); do
              STATE=$(az postgres flexible-server show \
                --resource-group "$AZURE_RESOURCE_GROUP" \
                --name "$PG_SERVER" \
                --query "state" -o tsv 2>/dev/null || echo "Unknown")
              if [ "$STATE" = "Ready" ]; then
                echo "✅ Server is ready."
                break
              fi
              if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
                echo "❌ Server did not become ready after $MAX_ATTEMPTS attempts." >&2
                exit 1
              fi
              echo "  …still waiting (attempt $i/$MAX_ATTEMPTS, state: $STATE)"
              sleep "$POLL_INTERVAL"
            done
          else
            echo "✅ Server is already running."
          fi

      # ── START ────────────────────────────────────────────────────────────
      - name: Start a backfill execution
        if: inputs.action == 'start'
        run: |
          set -euo pipefail

          # NOTE: We intentionally do NOT use `az containerapp job start
          # --image/--container-name/--env-vars` here. Passing those flags
          # creates an execution-level *container override* that replaces
          # (not merges with) the template's container spec. That drops
          # every env var from the Bicep template (AZURE_AI_ENDPOINT,
          # AZURE_AI_EMBEDDING_DEPLOYMENT, PGHOST/PGDATABASE/PGUSER/
          # PGPASSWORD/PGSSLMODE, …) and the missing command/args fall back
          # to the Dockerfile CMD (the SPA Express server), so the
          # execution never runs the backfill script.
          #
          # Instead, patch the per-run BACKFILL_* env vars onto the job
          # template via `az containerapp job update --set-env-vars`, then
          # start the execution with no overrides so it inherits the full
          # template (command, args, AI + PG env vars).

          ENV_VARS=(
            "BACKFILL_ENTITY=${{ inputs.entity }}"
            "BACKFILL_BATCH_SIZE=${{ inputs.batch_size }}"
            "BACKFILL_CONCURRENCY=${{ inputs.concurrency }}"
            "BACKFILL_WRITE_CONCURRENCY=${{ inputs.write_concurrency }}"
            "BACKFILL_MIN_ID=${{ inputs.min_id }}"
            "BACKFILL_TRACK_PROGRESS=true"
          )
          if [ -n "${{ inputs.max_id }}" ]; then
            ENV_VARS+=("BACKFILL_MAX_ID=${{ inputs.max_id }}")
          fi
          if [ -n "${{ inputs.limit }}" ]; then
            ENV_VARS+=("BACKFILL_LIMIT=${{ inputs.limit }}")
          fi
          if [ "${{ inputs.drop_index }}" = "true" ]; then
            ENV_VARS+=("BACKFILL_DROP_INDEX=true")
          fi

          echo "Patching BACKFILL_* env vars onto $JOB_NAME template:"
          printf '  %s\n' "${ENV_VARS[@]}"

          # `--set-env-vars` upserts the listed KEY=VALUE pairs into the
          # template's existing env array, leaving the other (AI/PG) env
          # vars untouched. `--replace-env-vars` would wipe them, so do
          # not use it here.
          az containerapp job update \
              --name "$JOB_NAME" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --set-env-vars "${ENV_VARS[@]}" \
              --output none

          echo "Starting $JOB_NAME (no container overrides — execution will inherit the full template)…"
          EXEC_OUTPUT="$(az containerapp job start \
              --name "$JOB_NAME" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --output json)"
          echo "$EXEC_OUTPUT"
          EXEC_NAME="$(echo "$EXEC_OUTPUT" | jq -r '.name // .properties.name // empty')"
          if [ -n "$EXEC_NAME" ]; then
            echo "✅ Started execution: $EXEC_NAME"
            echo "   Tail logs with:"
            echo "     az containerapp job logs show -n $JOB_NAME -g ${{ secrets.AZURE_RESOURCE_GROUP }} --execution $EXEC_NAME --container $JOB_NAME --follow"
            echo "   Or watch progress in DB:   GET https://<spa>/api/backfill/status"
          fi

      # ── STOP ─────────────────────────────────────────────────────────────
      - name: Stop a running execution
        if: inputs.action == 'stop'
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.execution_name }}" ]; then
            EXEC_NAME="${{ inputs.execution_name }}"
          else
            # Default to the most recent running execution.
            EXEC_NAME="$(az containerapp job execution list \
                --name "$JOB_NAME" \
                --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
                --query "[?properties.status=='Running'] | [0].name" -o tsv)"
          fi
          if [ -z "$EXEC_NAME" ]; then
            echo "::error::No running execution to stop. Pass execution_name explicitly or check 'status' first."
            exit 1
          fi
          echo "Stopping execution: $EXEC_NAME"
          az containerapp job stop \
              --name "$JOB_NAME" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --execution-name "$EXEC_NAME"
          echo "✅ Stop signal sent to $EXEC_NAME (SIGTERM; backfill will finish current page then mark progress as cancelled)."

      # ── STATUS ───────────────────────────────────────────────────────────
      - name: Show recent executions
        if: inputs.action == 'status'
        run: |
          set -euo pipefail
          echo "Recent executions of $JOB_NAME:"
          az containerapp job execution list \
              --name "$JOB_NAME" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --query "reverse(sort_by([].{name:name, status:properties.status, startTime:properties.startTime, endTime:properties.endTime}, &startTime))[:10]" \
              -o table

      # ── LOGS ─────────────────────────────────────────────────────────────
      - name: Show logs for an execution
        if: inputs.action == 'logs'
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.execution_name }}" ]; then
            EXEC_NAME="${{ inputs.execution_name }}"
          else
            EXEC_NAME="$(az containerapp job execution list \
                --name "$JOB_NAME" \
                --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
                --query "reverse(sort_by([], &properties.startTime)) | [0].name" -o tsv)"
          fi
          if [ -z "$EXEC_NAME" ]; then
            echo "::error::No executions found."
            exit 1
          fi
          echo "Logs for execution: $EXEC_NAME"
          # `--tail` keeps the output bounded for the Actions UI. Operators
          # who want live tailing should run `--follow` from their own shell.
          # NOTE: `az containerapp job logs show` rejects --tail values above
          # 300 ("ERROR: --tail must be between 0 and 300."), so we cap here.
          if ! az containerapp job logs show \
              --name "$JOB_NAME" \
              --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
              --container "$JOB_NAME" \
              --execution "$EXEC_NAME" \
              --tail 300; then
            echo "::warning::Could not stream logs for $EXEC_NAME (the execution may still be initialising, or the Container Apps Logs API rejected the request)."
          fi
